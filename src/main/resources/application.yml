server:
  port: 8080

spring:
  application:
    name: eolma-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - X-Trace-Id
            allowCredentials: true

      routes:
        # Auth (User Service)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # User/Member Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/members/**

        # Product Service
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**

        # Auction Service (REST)
        - id: auction-service-rest
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/auctions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # Auction Service (WebSocket)
        - id: auction-service-ws
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/auction/**

        # Payment Service
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:eolma-dev-secret-key-minimum-256-bits-for-hmac-sha256-algorithm}
  access-token-expiry: 1800000   # 30min
  refresh-token-expiry: 604800000 # 7days

logging:
  level:
    root: INFO
    com.eolma.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
