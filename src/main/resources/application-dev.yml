spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - X-Trace-Id
            allowCredentials: true

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/members/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**

        - id: auction-service-rest
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/auctions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        - id: auction-service-ws
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/auction/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: eolma-dev-secret-key-minimum-256-bits-for-hmac-sha256-algorithm

logging:
  level:
    root: INFO
    com.eolma.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
